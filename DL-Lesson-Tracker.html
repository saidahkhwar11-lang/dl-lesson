<script>
window.addEventListener('load', function(){

  setTimeout(function(){

    const secureStudent = JSON.parse(localStorage.getItem('DL_SECURE_STUDENT_LOGIN') || 'null');
    const secureTeacher = sessionStorage.getItem('DL_SECURE_TEACHER_LOGIN') === 'yes';

    if(secureTeacher){
      const teacherBox = document.getElementById('teacherPassword');
      if(teacherBox){
        teacherBox.value = 'Welcome@2020';
        openTeacherView();
      }
      return;
    }

    if(secureStudent){
      const nameBox = document.getElementById('studentName');
      const idBox = document.getElementById('studentCode');

      if(nameBox && idBox){
        nameBox.value = secureStudent.name;
        idBox.value = secureStudent.studentId || secureStudent.password;

        startStudentSession();
      }
    }

  }, 1200);

});
</script>
