<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>⚔️ Opinion Battle</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f7fb;
}

.topbar{
  background:#243b6b;
  color:white;
  padding:16px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.topic-box{
  background:white;
  border-radius:18px;
  padding:18px;
  margin-bottom:20px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.topic-box textarea{
  width:100%;
  min-height:70px;
  border-radius:12px;
  border:1px solid #ccd6e6;
  padding:12px;
  font-size:18px;
}

.team-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:18px;
}

.team-card{
  background:white;
  border-radius:18px;
  padding:18px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.team-card h2{
  margin-top:0;
  color:#243b6b;
}

label{
  font-weight:bold;
  display:block;
  margin-top:12px;
}

textarea,input{
  width:100%;
  box-sizing:border-box;
  border-radius:12px;
  border:1px solid #ccd6e6;
  padding:12px;
  margin-top:6px;
}

textarea{
  min-height:80px;
}

.submitBtn{
  margin-top:16px;
  width:100%;
  border:none;
  border-radius:14px;
  padding:14px;
  background:#243b6b;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.msg{
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  background:#eafaf1;
  color:#1e7d45;
  display:none;
}

</style>
</head>

<body>

<div class="topbar">
⚔️ Opinion Battle
</div>

<div class="container">

<div class="topic-box">
  <h2>Battle Topic</h2>

  <textarea id="battleTopic">
Technology helps students learn better.
  </textarea>
</div>

<div class="team-grid">

<!-- TEAM 1 -->
<div class="team-card">

<h2>🔵 Team 1</h2>

<label>Student Name</label>
<input id="name1">

<label>Opinion</label>
<textarea id="opinion1"></textarea>

<label>Reason</label>
<textarea id="reason1"></textarea>

<label>Evidence / Example</label>
<textarea id="evidence1"></textarea>

<label>Restate Opinion</label>
<textarea id="restate1"></textarea>

<button class="submitBtn" onclick="submitTeam(1)">
Submit Team 1
</button>

<div class="msg" id="msg1"></div>

</div>

<!-- TEAM 2 -->
<div class="team-card">

<h2>🔴 Team 2</h2>

<label>Student Name</label>
<input id="name2">

<label>Opinion</label>
<textarea id="opinion2"></textarea>

<label>Reason</label>
<textarea id="reason2"></textarea>

<label>Evidence / Example</label>
<textarea id="evidence2"></textarea>

<label>Restate Opinion</label>
<textarea id="restate2"></textarea>

<button class="submitBtn" onclick="submitTeam(2)">
Submit Team 2
</button>

<div class="msg" id="msg2"></div>

</div>

</div>

</div>

<script>

function submitTeam(team){

  const data = {
    name:document.getElementById('name' + team).value,
    opinion:document.getElementById('opinion' + team).value,
    reason:document.getElementById('reason' + team).value,
    evidence:document.getElementById('evidence' + team).value,
    restate:document.getElementById('restate' + team).value,
    topic:document.getElementById('battleTopic').value
  };

  localStorage.setItem(
    'opinionBattleTeam' + team,
    JSON.stringify(data)
  );

  const msg = document.getElementById('msg' + team);

  msg.style.display = 'block';

  msg.innerHTML =
    '✅ Team ' + team + ' answer submitted successfully!';
}

</script>

</body>
</html>
