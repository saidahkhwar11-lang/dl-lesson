<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>⚔️ Opinion Battle</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f7fb;
}

.topbar{
  background:#243b6b;
  color:white;
  padding:18px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

h2{
  margin-top:0;
  color:#243b6b;
}

input, textarea, select{
  width:100%;
  box-sizing:border-box;
  border-radius:12px;
  border:1px solid #ccd6e6;
  padding:12px;
  margin-top:8px;
  font-size:16px;
}

textarea{
  min-height:160px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#243b6b;
  color:white;
  font-size:18px;
  cursor:pointer;
  margin-top:15px;
}

.topic{
  background:#eef4ff;
  border:1px solid #cdddf7;
  border-radius:14px;
  padding:15px;
  font-size:20px;
  font-weight:bold;
  margin-bottom:15px;
}

.msg{
  margin-top:15px;
  padding:12px;
  border-radius:12px;
  display:none;
  background:#eafaf1;
  color:#1e7d45;
}

.hidden{
  display:none;
}

.battleBox{
  background:#f8fbff;
  border:1px solid #d6e3fa;
  border-radius:14px;
  padding:15px;
  margin-top:18px;
}

</style>
</head>

<body>

<div class="topbar">
⚔️ Opinion Battle
</div>

<div class="container">

<div id="joinPage">
<div class="card">

<h2>Join Your Team</h2>

<label>Group Number</label>
<select id="teamSelect">
  <option value="">Choose Team</option>
  <option value="1">Team 1</option>
  <option value="2">Team 2</option>
  <option value="3">Team 3</option>
  <option value="4">Team 4</option>
  <option value="5">Team 5</option>
  <option value="6">Team 6</option>
</select>

<label>Group Members</label>
<input id="groupMembers" placeholder="Write student names">

<button onclick="joinTeam()">
Join Battle
</button>

</div>
  </div>
<div class="card">
  <h2>👩‍🏫 Teacher Control</h2>

  <label>Teacher Password</label>
  <input id="teacherPass" type="password" placeholder="Enter teacher password">

  <button onclick="openPeerEvaluationStage()">
    🔓 Open Peer Evaluation Stage
  </button>

  <button onclick="resetOpinionBattle()" style="background:#b42318;">
    🗑 Reset Game
  </button>

  <div id="teacherMsg" class="msg"></div>
</div>

<div id="writingPage" class="hidden">

<div id="writingStage">  
<h2 id="battleTitle"></h2>

<div class="topic" id="battleTopic">
Technology helps students learn better.
</div>

<p>
Write ONE full opinion paragraph using:
Opinion + Reason + Evidence/Example + Restated Opinion
</p>

<textarea id="battleAnswer"
placeholder="Write your full OREO paragraph here..."></textarea>

<button onclick="submitBattleAnswer()">
Submit Team Answer
</button>

<div id="submitMsg" class="msg"></div>

</div>

<div id="evaluationPage" class="hidden">

<div id="stage2" class="card hidden">
  <h2>⚔️ Peer Evaluation Stage</h2>

<div id="battleDisplay"></div>

</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAe9rRwly1MvZh889dVq33RGyUbj4FVcQI",
  authDomain: "online-english-lesson-grade-9.firebaseapp.com",
  databaseURL: "https://online-english-lesson-grade-9-default-rtdb.firebaseio.com",
  projectId: "online-english-lesson-grade-9",
  storageBucket: "online-english-lesson-grade-9.firebasestorage.app",
  appId: "1:542666648554:web:5190c68ea73b3536dae093"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const gameRef = db.ref('opinionBattleGame');

let currentTeam = '';

function joinTeam(){

  const team = document.getElementById('teamSelect').value;

  if(!team){
    alert('Choose your team first.');
    return;
  }

  currentTeam = team;

  document.getElementById('writingStage').classList.remove('hidden');

  let opponent = '';

  if(team == 1) opponent = 2;
  if(team == 2) opponent = 1;

  if(team == 3) opponent = 4;
  if(team == 4) opponent = 3;

  if(team == 5) opponent = 6;
  if(team == 6) opponent = 5;

  document.getElementById('battleTitle').innerHTML =
    '⚔️ Team ' + team + ' VS Team ' + opponent;
}

async function submitBattleAnswer(){

  const members =
    document.getElementById('groupMembers').value.trim();

  const answer =
    document.getElementById('battleAnswer').value.trim();

  if(!members || !answer){
    alert('Please complete all fields.');
    return;
  }

  await gameRef.child('teams/team' + currentTeam).set({
    team: currentTeam,
    members: members,
    answer: answer,
    submittedAt: Date.now()
  });
  loadEvaluationBattles();

  const msg = document.getElementById('submitMsg');

  msg.style.display = 'block';

  msg.innerHTML =
    '✅ Team ' + currentTeam + ' submitted successfully!';
}

gameRef.on('value', function(snapshot){

  const game = snapshot.val() || {};

  const data = game.teams || {};

  const stage =
    (game.settings && game.settings.stage)
    || 'writing';

  if(stage === 'evaluation'){
    document.getElementById('stage2')
      .classList.remove('hidden');
  }else{
    document.getElementById('stage2')
      .classList.add('hidden');
  }

  let html = '';

  html += createBattleEvaluationHtml(data,1,2);
  html += createBattleEvaluationHtml(data,3,4);
  html += createBattleEvaluationHtml(data,5,6);

  document.getElementById('battleDisplay')
    .innerHTML = html;
});

function createBattleHtml(data,a,b){

  const teamA = data['team' + a];
  const teamB = data['team' + b];

  if(!teamA || !teamB) return '';

  return `
    <div class="battleBox">

      <h3>⚔️ Team ${a} VS Team ${b}</h3>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">

        <div>
          <h4>🔵 Team ${a}</h4>
          <p>${escapeHtml(teamA.answer)}</p>
        </div>

        <div>
          <h4>🔴 Team ${b}</h4>
          <p>${escapeHtml(teamB.answer)}</p>
        </div>

      </div>

    </div>
  `;
}

function escapeHtml(text){
  return text
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

  async function openPeerEvaluationStage(){

  const pass =
    document.getElementById('teacherPass').value;

  if(pass !== '1234'){
    alert('Wrong teacher password.');
    return;
  }

  await gameRef.child('settings/stage').set('evaluation');
loadEvaluationBattles();
    
  const msg = document.getElementById('teacherMsg');

  msg.style.display = 'block';

  msg.innerHTML =
    '✅ Peer Evaluation Stage opened.';
}

async function resetOpinionBattle(){

  const pass =
    document.getElementById('teacherPass').value;

  if(pass !== '1234'){
    alert('Wrong teacher password.');
    return;
  }

  if(!confirm('Reset the whole game?')) return;

  await gameRef.set({
    settings:{
      stage:'writing'
    }
  });

  alert('Game reset.');

  location.reload();
}
  function createBattleEvaluationHtml(data,a,b){

  const teamA = data['team' + a];
  const teamB = data['team' + b];

  if(!teamA || !teamB){

    return `
      <div class="battleBox">
        <h3>⚔️ Team ${a} VS Team ${b}</h3>
        <p>Waiting for both teams...</p>
      </div>
    `;
  }

  return `
    <div class="battleBox">

      <h3>
        ⚔️ Team ${a} VS Team ${b}
      </h3>

      <div style="
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:15px;
      ">

        <div>
          <h4>🔵 Team ${a}</h4>

          <p>
            <b>Members:</b>
            ${escapeHtml(teamA.members || '')}
          </p>

          <p>
            ${escapeHtml(teamA.answer || '')}
          </p>
        </div>

        <div>
          <h4>🔴 Team ${b}</h4>

          <p>
            <b>Members:</b>
            ${escapeHtml(teamB.members || '')}
          </p>

          <p>
            ${escapeHtml(teamB.answer || '')}
          </p>
        </div>

      </div>

    </div>
  `;
}
  function loadEvaluationBattles(){

  gameRef.child('teams').once('value', function(snapshot){

    const data = snapshot.val() || {};

    let html = '';

    html += createBattleEvaluationHtml(data,1,2);
    html += createBattleEvaluationHtml(data,3,4);
    html += createBattleEvaluationHtml(data,5,6);

    document.getElementById('battleDisplay').innerHTML = html;
  });
}

  function showPage(pageId){

  const pages = [
    'joinPage',
    'writingPage',
    'evaluationPage'
  ];

  pages.forEach(function(id){

    const el = document.getElementById(id);

    if(el){
      el.classList.add('hidden');
    }
  });

  const target = document.getElementById(pageId);

  if(target){
    target.classList.remove('hidden');
  }
}

</script>

</body>
</html>
